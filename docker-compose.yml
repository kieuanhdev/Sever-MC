version: "3.8"

services:
  mc:
    image: itzg/minecraft-server
    container_name: paper-mc-server
    tty: true
    stdin_open: true
    ports:
      - "25565:25565" # Cổng mặc định của Minecraft để người chơi kết nối
      - "8100:8100"   # Cổng cho bản đồ 3D BlueMap (http://IP_Server:8100)
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "1.20.4"
      ONLINE_MODE: "FALSE"
      MEMORY: "2G"
      
      # Tự động tải các Plugin từ Modrinth (Nhanh và ổn định hơn):
      MODRINTH_PROJECTS: "skinsrestorer,chunky,bluemap,gsit"
      
      # Tải EssentialsX bằng đường link trực tiếp
      PLUGINS: "https://github.com/EssentialsX/Essentials/releases/download/2.22.0/EssentialsX-2.22.0.jar"
      
    volumes:
      - ./data:/data
    restart: unless-stopped

  # Bảng điều khiển Web mới (RCON Web Admin - Ổn định tuyệt đối, không sợ lỗi Java)
  rcon-web:
    image: itzg/rcon
    container_name: rcon-web-admin
    ports:
      - "8088:4326"
      - "4327:4327"
    environment:
      RWA_RCON_HOST: "mc"
      RWA_RCON_PORT: "25575"
      RWA_RCON_PASSWORD: "minecraft"  # Mật khẩu rcon nội bộ của MC
      RWA_PASSWORD: "admin"           # Mật khẩu để bạn đăng nhập vào web (user là admin)
    restart: unless-stopped
