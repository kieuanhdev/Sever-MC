version: "3.8"

services:
  mc:
    image: itzg/minecraft-server
    container_name: paper-mc-server
    tty: true
    stdin_open: true
    ports:
      - "25565:25565" # Cổng mặc định của Minecraft để người chơi kết nối
      - "8088:8080"   # Cổng Host 8088 trỏ vào WebAdmin 8080 (Tránh trùng cổng)
      - "8100:8100"   # Cổng cho bản đồ 3D BlueMap (http://IP_Server:8100)
    environment:
      EULA: "TRUE"              # Tự động đồng ý điều khoản của Mojang
      TYPE: "PAPER"             # Sử dụng server loại Paper
      VERSION: "1.20.4"         # Phiên bản Minecraft (1.20.4 cực kỳ ổn định cho plugin hiện nay)
      ONLINE_MODE: "FALSE"      # Chế độ Crack (không yêu cầu tài khoản Premium)
      MEMORY: "2G"              # Giới hạn RAM tối đa
      
      # Tự động tải các Plugin từ SpigotMC:
      # 111867: WebAdmin (Bảng điều khiển Web)
      # 9089: EssentialsX (Cung cấp các lệnh cơ bản)
      SPIGET_RESOURCES: "111867,9089"
      
      # Tự động tải các Plugin từ Modrinth (Nhanh và ổn định hơn):
      MODRINTH_PROJECTS: "skinsrestorer,chunky,bluemap,gsit"
      
    volumes:
      - ./data:/data
    restart: unless-stopped
